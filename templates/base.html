<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>{% block title %}ukenchan{% endblock %}</title>
</head>
<body>
    <header>
        <center><h1 style="margin: 0px; padding: 10px; font-size: 200%"><b style="background-color: blue; color: white;">UKEN</b>CHAN</h1></center>
        <div class="menu">działy: 
        {% for section in sections %}<a href="/section/{{section.name}}">{{section.name}}</a>/{% endfor %}
        <span class="login">
            <a href="/accounts/login">login</a>
            <a href="/accounts/login">register</a>
        </span>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    <script>
        document.querySelectorAll('.images img').forEach(img => {
            img.addEventListener('click', () => {
                if (img.style.height) {
                    img.style.width = '';
                    img.style.height = '';
                    img.style.flexBasis = '';
                } else {
                    img.style.height = '60vh';
                    img.style.width = '100%';
                    img.style.flexBasis = '100%';
                }
            });
        });
    </script>
</body>
</html>
