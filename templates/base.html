<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>{% block title %}UkenChan{% endblock %}</title>
</head>
<body>
    <header>
        {%block header%}{%endblock%}
        <div class="menu"> 
        {% for section in sections %}<a href="/section/{{section.name}}">{{section.name}}</a>{% endfor %}
        <span class="login">
            {%if not user.username%}
            <a href="/accounts/login">[Logowanie]</a>
            <a href="/accounts/register">[Rejestracja]</a>
            {%else%}
            {{ user.username }}
            <form style="display: inline;" action="/accounts/logout/" method="POST">{% csrf_token %}<button type="submit">Logout</button></form>
            {%endif%}

        </span>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    <script>
        document.querySelectorAll('.images img').forEach(img => {
            img.addEventListener('click', () => {
                if (img.style.height) {
                    img.style.width = '';
                    img.style.height = '';
                    img.style.flexBasis = '';
                } else {
                    img.src = img.dataset.fullpng;
                    img.style.maxHeight = '500px';
                    img.style.maxWidth = '500px';
                    img.style.width = 'auto';
                    img.style.height = 'auto';
                    img.style.flexBasis = '100%';
                }
            });
        });
    </script>
<div style="text-align: center; margin-top: 30px;">
    <a href="/regulamin/" style="color: #268bd2; text-decoration: none; font-family: monospace;">[ Przeczytaj Regulamin UkenChana ]</a>
</div>
</body>
</html>
