<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>{% block title %}ukenchan{% endblock %}</title>
</head>
<body>
    <header>
        <div class="menu">działy: 
        {% for section in sections %}<a href="/section/{{section.name}}">{{section.name}}</a>/{% endfor %}
        <span class="login">
            {%if not user.username%}
            <a href="/accounts/login">login</a>
            <a href="/accounts/register">register</a>
            {%else%}
            {{ user.username }}
            <form style="display: inline;" action="/accounts/logout/" method="POST">{% csrf_token %}<button type="submit">Logout</button></form>
            {%endif%}

        </span>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    <script>
        document.querySelectorAll('.images img').forEach(img => {
            img.addEventListener('click', () => {
                if (img.style.height) {
                    img.style.width = '';
                    img.style.height = '';
                    img.style.flexBasis = '';
                } else {
                    img.style.height = '60vh';
                    img.style.width = '100%';
                    img.style.flexBasis = '100%';
                }
            });
        });
    </script>
</body>
</html>
