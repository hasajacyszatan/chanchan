<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
    <title>{% block title %}UkenChan{% endblock %}</title>
</head>
<body>
    <header>
        {% block header %}{% endblock %}
        <div class="menu">
            {% for section in sections %}
                <a href="/section/{{ section.name }}">{{ section.name }}</a>
            {% endfor %}
            <span class="login">
                {% if not user.is_authenticated %}
                    <a href="/accounts/login">[Logowanie]</a>
                    <a href="/accounts/register">[Rejestracja]</a>
                {% else %}
                    {{ user.username }}
                    <form style="display:inline;" action="/accounts/logout/" method="POST">
                        {% csrf_token %}
                        <button type="submit">Logout</button>
                    </form>
                {% endif %}
            </span>
        </div>
    </header>

    {% block content %}{% endblock %}

<div style="text-align: center; margin-top: 30px; font-family: monospace;">
    <a href="/" style="color: #268bd2; text-decoration: none;">[ Strona Główna ]</a>
</div>

<button id="scrollToTopBtn" title="Wróć na górę">
    ▲ W górę
</button>
<script src="/static/js/misc_scripts.js"></script>
<script src="/static/js/replysupporter.js"></script>
<button id="themeToggle">[ 💡 Jasny motyw ]</button>

<style>
    #themeToggle {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: transparent;
        color: #268bd2;
        border: 1px solid #268bd2;
        padding: 5px 10px;
        font-family: monospace;
        cursor: pointer;
        z-index: 999;
    }
    #themeToggle:hover {
        background: #268bd2;
        color: #ffffff;
    }

    body.light-theme {
        background-color: #8bb2d9 !important;
        color: #002b36 !important;
    }
    body.light-theme a {
        color: #004080 !important;
    }
    
    body.light-theme div, 
    body.light-theme span, 
    body.light-theme p, 
    body.light-theme .ep-card, 
    body.light-theme .post-card {
        background-color: #a3c6e8 !important;
        border-color: #6a95bd !important;
        color: #002b36 !important;
    }
</style>
<script>
    
    const themeBtn = document.getElementById('themeToggle');
    
    themeBtn.addEventListener('click', () => {
        
        document.body.classList.toggle('light-theme');
        
        
        if(document.body.classList.contains('light-theme')) {
            themeBtn.innerText = '[ 🌙 Ciemny motyw ]';
        } else {
            themeBtn.innerText = '[ 💡 Jasny motyw ]';
        }
    });
</script>
</body>
</html>
